<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planificador Quincenal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; font-family: 'Inter', system-ui, sans-serif; color: #f8fafc; min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const STORAGE_KEY = "planificador_data_v1";

const fmt = (n) => "$" + Math.round(n).toLocaleString("es-CO");
const pct = (a, b) => b === 0 ? 0 : Math.min(100, Math.round(((b - a) / b) * 100));

const DEUDAS_DEFAULT = [
  { id:1, nombre:"Banco Nu",        cuota:140000, saldoInicial:8900000, saldoActual:8900000, color:"#6366f1" },
  { id:2, nombre:"Davivienda",      cuota:70000,  saldoInicial:2200000, saldoActual:2200000, color:"#f59e0b" },
  { id:3, nombre:"Bancolombia",     cuota:80000,  saldoInicial:2000000, saldoActual:2000000, color:"#10b981" },
  { id:4, nombre:"Sumas Pay",       cuota:100000, saldoInicial:580000,  saldoActual:580000,  color:"#ef4444" },
  { id:5, nombre:"Banco Occidente", cuota:130000, saldoInicial:5200000, saldoActual:5200000, color:"#8b5cf6" },
];

const GASTOS_DEFAULT = [
  { id:1, nombre:"Arriendo + Servicios",    monto:1800000 },
  { id:2, nombre:"Alimentación / Mercado",  monto:300000  },
  { id:3, nombre:"Jardín del niño",         monto:500000  },
  { id:4, nombre:"Combustible",             monto:100000  },
  { id:5, nombre:"Rodamiento",              monto:50000   },
  { id:6, nombre:"Plan celulares",          monto:200000  },
];

function App() {
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  })();

  const [quincena,   setQuincena]   = useState(saved.quincena   || 1650000);
  const [ahorroMeta, setAhorroMeta] = useState(saved.ahorroMeta || 100000);
  const [deudas,     setDeudas]     = useState(saved.deudas     || DEUDAS_DEFAULT);
  const [gastos,     setGastos]     = useState(saved.gastos     || GASTOS_DEFAULT);
  const [tab,        setTab]        = useState("dashboard");
  const [deudaTab,   setDeudaTab]   = useState("saldos");
  const [editando,   setEditando]   = useState(null);
  const [saved_ok,   setSavedOk]    = useState(false);

  // Persistencia automática
  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ quincena, ahorroMeta, deudas, gastos }));
    setSavedOk(true);
    const t = setTimeout(() => setSavedOk(false), 1500);
    return () => clearTimeout(t);
  }, [quincena, ahorroMeta, deudas, gastos]);

  const totalGastos   = useMemo(() => gastos.reduce((a,g) => a+g.monto, 0), [gastos]);
  const totalCuotas   = useMemo(() => deudas.reduce((a,d) => a+d.cuota, 0), [deudas]);
  const totalSaldoAct = useMemo(() => deudas.reduce((a,d) => a+d.saldoActual, 0), [deudas]);
  const totalSaldoIni = useMemo(() => deudas.reduce((a,d) => a+d.saldoInicial, 0), [deudas]);
  const totalPagado   = totalSaldoIni - totalSaldoAct;

  const ingresoMes  = quincena * 2;
  const gastosBi    = totalGastos / 2;
  const deudasBi    = totalCuotas / 2;
  const disponiBi   = quincena - gastosBi - deudasBi - ahorroMeta;
  const disponiMes  = ingresoMes - totalGastos - totalCuotas - ahorroMeta * 2;

  const saludPct   = Math.min(100, Math.max(0, (disponiBi / quincena) * 100));
  const saludColor = saludPct >= 20 ? "#10b981" : saludPct >= 10 ? "#f59e0b" : "#ef4444";
  const saludLabel = saludPct >= 20 ? "✅ Saludable" : saludPct >= 10 ? "⚠️ Ajustado" : "🔴 Crítico";

  const segments = [
    { label:"Gastos", value:gastosBi,                  color:"#64748b" },
    { label:"Deudas", value:deudasBi,                  color:"#ef4444" },
    { label:"Ahorro", value:ahorroMeta,                color:"#10b981" },
    { label:"Libre",  value:Math.max(0, disponiBi),    color:"#3b82f6" },
  ];
  const totalBar = segments.reduce((a,s) => a+s.value, 0) || 1;

  const upDeuda = (id, field, val) =>
    setDeudas(deudas.map(d => d.id===id ? {...d, [field]: Number(val)} : d));
  const upGasto = (id, val) =>
    setGastos(gastos.map(g => g.id===id ? {...g, monto: Number(val)} : g));

  const css = {
    root:       { maxWidth:480, margin:"0 auto", padding:16, minHeight:"100vh" },
    header:     { display:"flex", justifyContent:"space-between", alignItems:"flex-start",
                  paddingBottom:16, marginBottom:20, borderBottom:"1px solid #1e293b" },
    badge:      (c) => ({ fontSize:12, fontWeight:600, padding:"6px 12px", borderRadius:20,
                  background:c+"22", border:`1px solid ${c}`, color:c, whiteSpace:"nowrap" }),
    tabs:       { display:"flex", gap:8, marginBottom:16 },
    tab:        (a) => ({ flex:1, padding:"10px 4px", borderRadius:10, cursor:"pointer", fontSize:12,
                  fontWeight: a?700:400, border: a?"1px solid #3b82f6":"1px solid #1e293b",
                  background: a?"#172554":"#1e293b", color: a?"#93c5fd":"#64748b" }),
    subTab:     (a) => ({ flex:1, padding:"9px 4px", borderRadius:10, cursor:"pointer", fontSize:12,
                  fontWeight: a?700:400, border: a?"1px solid #6366f1":"1px solid #1e293b",
                  background: a?"#1e1b4b":"#1e293b", color: a?"#a5b4fc":"#64748b" }),
    card:       { background:"#1e293b", borderRadius:14, padding:16, marginBottom:12, border:"1px solid #334155" },
    cardLabel:  { fontSize:11, letterSpacing:1.5, color:"#64748b", marginBottom:10, textTransform:"uppercase" },
    sub:        { fontSize:12, color:"#475569", marginTop:6 },
    inputRow:   { display:"flex", alignItems:"center", gap:4 },
    prefix:     { fontSize:28, fontWeight:800, color:"#34d399" },
    bigIn:      (c) => ({ background:"transparent", border:"none", outline:"none", fontSize:34,
                  fontWeight:800, color:c, width:"100%", fontFamily:"inherit" }),
    barWrap:    { display:"flex", height:20, borderRadius:10, overflow:"hidden", marginBottom:14, gap:2 },
    barSeg:     (c,w) => ({ background:c, width:`${w}%`, minWidth:4, borderRadius:4, transition:"width .5s" }),
    legend:     { display:"flex", flexWrap:"wrap", gap:"6px 16px" },
    lItem:      { display:"flex", alignItems:"center", gap:6 },
    dot:        (c) => ({ width:10, height:10, borderRadius:"50%", background:c, flexShrink:0 }),
    g2:         { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 },
    mCard:      (bg,ac) => ({ background:bg, border:`1px solid ${ac}33`, borderRadius:14, padding:14 }),
    mLabel:     { fontSize:10, color:"#64748b", letterSpacing:1, marginBottom:6, textTransform:"uppercase" },
    mVal:       (c) => ({ fontSize:20, fontWeight:800, color:c, marginBottom:2 }),
    mSub:       { fontSize:11, color:"#475569" },
    lRow:       { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", fontSize:14 },
    divider:    { borderTop:"1px solid #334155", margin:"4px 0" },
    editRow:    { display:"flex", alignItems:"center", gap:12, background:"#1e293b", borderRadius:12,
                  padding:"14px 16px", marginBottom:8, border:"1px solid #334155" },
    editVal:    { color:"#e2e8f0", fontWeight:700, fontSize:14, cursor:"pointer", padding:"4px 8px",
                  borderRadius:8, background:"#0f172a", border:"1px solid #334155" },
    inIn:       (c) => ({ background:"#0f172a", border:"1px solid #3b82f6", borderRadius:8,
                  color: c||"#34d399", fontWeight:700, fontSize:14, padding:"4px 8px",
                  width:140, outline:"none", fontFamily:"inherit", textAlign:"right" }),
  };

  return (
    <div style={css.root}>
      {/* HEADER */}
      <div style={css.header}>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:"#475569",marginBottom:4}}>PLANIFICADOR QUINCENAL</div>
          <div style={{fontSize:20,fontWeight:700}}>Tu quincena, organizada</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
          <div style={css.badge(saludColor)}>{saludLabel}</div>
          {saved_ok && <div style={{fontSize:10,color:"#34d399"}}>✓ guardado</div>}
        </div>
      </div>

      {/* TABS */}
      <div style={css.tabs}>
        {[["dashboard","📊 Resumen"],["gastos","🏠 Gastos"],["deudas","💳 Deudas"]].map(([t,l]) => (
          <button key={t} style={css.tab(tab===t)} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      {/* ════ DASHBOARD ════ */}
      {tab==="dashboard" && <>
        <div style={css.card}>
          <div style={css.cardLabel}>¿Cuánto te pagaron esta quincena?</div>
          <div style={css.inputRow}>
            <span style={css.prefix}>$</span>
            <input type="number" value={quincena}
              onChange={e=>setQuincena(Number(e.target.value))}
              style={css.bigIn("#34d399")}/>
          </div>
          <div style={css.sub}>Ingreso mensual estimado: <strong style={{color:"#10b981"}}>{fmt(ingresoMes)}</strong></div>
        </div>

        <div style={css.card}>
          <div style={css.cardLabel}>¿A dónde va tu quincena?</div>
          <div style={css.barWrap}>
            {segments.map(sg=>(
              <div key={sg.label} style={css.barSeg(sg.color,(sg.value/totalBar)*100)}/>
            ))}
          </div>
          <div style={css.legend}>
            {segments.map(sg=>(
              <div key={sg.label} style={css.lItem}>
                <div style={css.dot(sg.color)}/>
                <span style={{fontSize:12,color:"#94a3b8"}}>{sg.label} <strong>{fmt(sg.value)}</strong></span>
              </div>
            ))}
          </div>
        </div>

        <div style={css.g2}>
          <div style={css.mCard("#1e293b","#64748b")}>
            <div style={css.mLabel}>Gastos / quincena</div>
            <div style={css.mVal("#e2e8f0")}>{fmt(gastosBi)}</div>
            <div style={css.mSub}>de {fmt(totalGastos)}/mes</div>
          </div>
          <div style={css.mCard("#1e293b","#ef4444")}>
            <div style={css.mLabel}>Cuotas / quincena</div>
            <div style={css.mVal("#fca5a5")}>{fmt(deudasBi)}</div>
            <div style={css.mSub}>de {fmt(totalCuotas)}/mes</div>
          </div>
        </div>

        {/* Deuda total restante */}
        <div style={{...css.card, background:"#1a1033", border:"1px solid #6366f133"}}>
          <div style={css.cardLabel}>Deuda total restante</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:10}}>
            <div>
              <div style={{fontSize:26,fontWeight:800,color:"#f87171"}}>{fmt(totalSaldoAct)}</div>
              <div style={{fontSize:12,color:"#64748b"}}>de {fmt(totalSaldoIni)} iniciales</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:18,fontWeight:700,color:"#818cf8"}}>{pct(totalSaldoAct,totalSaldoIni)}% pagado</div>
              <div style={{fontSize:12,color:"#64748b"}}>ahorrado: {fmt(totalPagado)}</div>
            </div>
          </div>
          <div style={{height:10,background:"#0f172a",borderRadius:6,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct(totalSaldoAct,totalSaldoIni)}%`,
              background:"linear-gradient(90deg,#6366f1,#a78bfa)",borderRadius:6,transition:"width .6s"}}/>
          </div>
        </div>

        <div style={css.card}>
          <div style={css.cardLabel}>Ahorro emprendimiento (quincenal)</div>
          <div style={css.inputRow}>
            <span style={css.prefix}>$</span>
            <input type="number" value={ahorroMeta}
              onChange={e=>setAhorroMeta(Number(e.target.value))}
              style={css.bigIn("#34d399")}/>
          </div>
        </div>

        {/* NÚMERO CLAVE */}
        <div style={{...css.card, background:disponiBi>0?"#064e3b":"#450a0a",
          border:`2px solid ${disponiBi>0?"#10b981":"#ef4444"}`, textAlign:"center", padding:"28px 20px"}}>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:8,letterSpacing:2}}>SEPARAR A CUENTA DE AHORRO / COLCHÓN</div>
          <div style={{fontSize:44,fontWeight:800,color:disponiBi>0?"#34d399":"#f87171",lineHeight:1,marginBottom:6}}>
            {fmt(Math.abs(disponiBi))}
          </div>
          <div style={{fontSize:13,color:"#94a3b8"}}>por quincena</div>
          {disponiBi < 0 && (
            <div style={{marginTop:14,padding:"10px 14px",background:"#7f1d1d55",borderRadius:10,fontSize:13,color:"#fca5a5"}}>
              ⚠️ Esta quincena no alcanza. Ajusta el ahorro o las cuotas.
            </div>
          )}
          {disponiBi >= 0 && disponiBi < 100000 && (
            <div style={{marginTop:14,padding:"10px 14px",background:"#78350f55",borderRadius:10,fontSize:13,color:"#fcd34d"}}>
              ⚠️ Margen muy bajo. Considera reducir el ahorro.
            </div>
          )}
        </div>

        {/* Resumen mensual */}
        <div style={css.card}>
          <div style={css.cardLabel}>Resumen mensual (2 quincenas)</div>
          {[
            ["Ingresos totales",       fmt(ingresoMes),        "#34d399"],
            ["Gastos fijos",           `- ${fmt(totalGastos)}`, "#e2e8f0"],
            ["Cuotas deudas",          `- ${fmt(totalCuotas)}`, "#fca5a5"],
            ["Ahorro emprendimiento",  `- ${fmt(ahorroMeta*2)}`,"#6ee7b7"],
          ].map(([l,v,c])=>(
            <div key={l} style={css.lRow}>
              <span style={{color:"#94a3b8"}}>{l}</span>
              <span style={{color:c,fontWeight:600}}>{v}</span>
            </div>
          ))}
          <div style={css.divider}/>
          <div style={css.lRow}>
            <span style={{color:"#f8fafc",fontWeight:700,fontSize:15}}>Disponible libre</span>
            <span style={{fontWeight:800,fontSize:17,color:disponiMes>=0?"#34d399":"#f87171"}}>
              {disponiMes<0?"- ":""}{fmt(Math.abs(disponiMes))}
            </span>
          </div>
        </div>
      </>}

      {/* ════ GASTOS ════ */}
      {tab==="gastos" && <>
        <div style={{...css.card,marginBottom:8}}>
          <div style={css.cardLabel}>Gastos fijos mensuales</div>
          <div style={css.sub}>Toca el valor para editarlo</div>
        </div>
        {gastos.map(g=>(
          <div key={g.id} style={css.editRow}>
            <span style={{color:"#cbd5e1",fontSize:14,flex:1}}>{g.nombre}</span>
            {editando===`g${g.id}` ? (
              <input autoFocus type="number" defaultValue={g.monto} style={css.inIn()}
                onBlur={e=>{ upGasto(g.id,e.target.value); setEditando(null); }}
                onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }}/>
            ) : (
              <span style={css.editVal} onClick={()=>setEditando(`g${g.id}`)}>{fmt(g.monto)} ✏️</span>
            )}
          </div>
        ))}
        <div style={{...css.card,background:"#1e3a2f",border:"1px solid #10b981",textAlign:"right"}}>
          <div style={{fontSize:11,color:"#6ee7b7",marginBottom:4}}>TOTAL MENSUAL</div>
          <div style={{fontSize:26,fontWeight:800,color:"#34d399"}}>{fmt(totalGastos)}</div>
          <div style={{fontSize:12,color:"#6ee7b7"}}>Quincenal: {fmt(totalGastos/2)}</div>
        </div>
      </>}

      {/* ════ DEUDAS ════ */}
      {tab==="deudas" && <>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["saldos","📉 Saldos mes a mes"],["cuotas","💸 Cuotas mensuales"]].map(([t,l])=>(
            <button key={t} style={css.subTab(deudaTab===t)} onClick={()=>setDeudaTab(t)}>{l}</button>
          ))}
        </div>

        {deudaTab==="saldos" && <>
          <div style={{...css.card,marginBottom:8,background:"#1a1033",border:"1px solid #6366f133"}}>
            <div style={css.cardLabel}>Saldo actual por banco</div>
            <div style={css.sub}>Actualiza el saldo cada mes para ver tu progreso 📆</div>
          </div>
          {deudas.map(d=>{
            const pp = pct(d.saldoActual, d.saldoInicial);
            return (
              <div key={d.id} style={{...css.card,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={css.dot(d.color)}/>
                  <span style={{color:"#f1f5f9",fontWeight:700,fontSize:15,flex:1}}>{d.nombre}</span>
                  <span style={{fontSize:12,color:d.color,fontWeight:700,padding:"3px 10px",borderRadius:20,
                    background:d.color+"22",border:`1px solid ${d.color}44`}}>{pp}% pagado</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>SALDO INICIAL</div>
                    <div style={{fontSize:14,color:"#64748b",fontWeight:600}}>{fmt(d.saldoInicial)}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>SALDO ACTUAL</div>
                    {editando===`s${d.id}` ? (
                      <input autoFocus type="number" defaultValue={d.saldoActual} style={css.inIn(d.color)}
                        onBlur={e=>{ upDeuda(d.id,"saldoActual",e.target.value); setEditando(null); }}
                        onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }}/>
                    ) : (
                      <div onClick={()=>setEditando(`s${d.id}`)} style={{fontSize:18,fontWeight:800,color:d.color,
                        cursor:"pointer",padding:"2px 8px",borderRadius:8,
                        background:d.color+"11",border:`1px solid ${d.color}33`}}>
                        {fmt(d.saldoActual)} ✏️
                      </div>
                    )}
                  </div>
                </div>
                <div style={{height:8,background:"#0f172a",borderRadius:6,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pp}%`,background:d.color,borderRadius:6,transition:"width .6s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                  <span style={{fontSize:11,color:"#475569"}}>
                    Pagado: <span style={{color:"#34d399",fontWeight:600}}>{fmt(d.saldoInicial-d.saldoActual)}</span>
                  </span>
                  <span style={{fontSize:11,color:"#475569"}}>
                    Faltan: <span style={{color:d.color,fontWeight:600}}>{fmt(d.saldoActual)}</span>
                  </span>
                </div>
              </div>
            );
          })}
          <div style={{...css.card,background:"#1a1033",border:"1px solid #6366f1",marginTop:4}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:11,color:"#818cf8",letterSpacing:1}}>TOTAL DEUDAS</div>
              <div style={{fontSize:11,color:"#818cf8"}}>{pct(totalSaldoAct,totalSaldoIni)}% pagado</div>
            </div>
            <div style={{height:10,ba
